project:
  name: "ARD Genomic SEM"
  root: /mnt/sdg/robert/ardmr/GSEM

paths:
  sumstats_dir: sumstats
  manifest_dir: manifest
  meta_dir: meta
  reference_dir: reference
  output_dir: output_z2
  ld_scores: reference/eur_w_ld_chr
  hm3_snplist: reference/w_hm3.snplist
  variants_manifest: manifest/variants.tsv.bgz
  # Single GenomicSEM-curated text file (.txt or .txt.gz both fine), NOT a PLINK prefix.
  # Download: https://utexas.box.com/s/vkd36n197m8klbaio3yzoxsee6sxo11v
  thousand_g_reference: reference/reference.1000G.maf.0.005.txt.gz
  # PLINK bfile prefix (no .bed/.bim/.fam extension) for --clump in post-hoc Q_SNP filter.
  thousand_g_plink_bfile: reference/1000g_plink/EUR

munge:
  use_neff: true
  maf_threshold: 0.01
  # linear -> log(OR) conversion thresholds. Warn when sample prevalence K is below
  # K_warn_threshold (or above 1 - K_warn_threshold); reject when K(1-K) is below
  # K_reject_threshold. The Neale linear-regression-on-0/1 approximation degrades at
  # extreme K for SNPs with non-trivial effect; warn at 1%% by default.
  K_warn_threshold: 0.01
  K_reject_threshold: 1.0e-9
  # APOE-e4 sentinel: rs429358 in Neale UKBB is alt=C, A1=alt convention -> a1=C.
  polarity_sentinel:
    rsid: rs429358
    a1: C
  smoothing_frob_halt: 0.025

discover:
  # discover_traits() regex applied to filenames in sumstats/{sex}/.
  # Default matches Neale UKBB round-2 naming: <code>.gwas.imputed_v3.<sex>.tsv.bgz
  # Stored outside config$munge so editing this key doesn't invalidate the munge
  # stage's resume-hash.
  sumstats_filename_pattern: "\\.gwas\\.imputed_v3\\."

ldsc:
  h2_z_threshold: 2.0
  liability_scale: true
  pop_prev_source: ukb_cohort
  min_factors_required: 3

efa:
  rotation: geomin
  loading_threshold: 0.30
  use_parallel_analysis: true

cfa:
  estimator: DWLS
  model_source: both
  min_indicators_per_factor: 2
  apriori_source: icd10_chapters

comparison:
  mode: wald_test

gwas:
  smooth_check: true
  output_format: gwas_vcf
  genome_build: GRCh37
  study_id_prefix: ARD-GSEM
  snp_chunk_size: 50000
  # Marker-variable identification (first indicator loading fixed to 1) so the
  # GenomicSEM N_hat formula applies (Wiki 5: "this should not be set to TRUE if
  # the researcher plans to calculate the implied sample size of the factors").
  std_lv: false
  fix_measurement: true
  genomic_control: standard
  q_snp: true
  # MAF restriction for N_hat factor-sample-size computation (Wiki 4).
  nhat_maf_threshold: 0.10
  # MHC exclusion window (GRCh37); applied post-hoc in QC filters / Manhattans.
  mhc_chr: 6
  mhc_start: 25000000
  mhc_end: 35000000

sumstats:
  # Delete <sex>_<trait>_pre_munge.tsv files after sumstats() consumes them.
  # These are large (~250 GB at 230 traits x 2 sexes). Default false so we never
  # delete by surprise; flip on once the run has shipped.
  cleanup_pre_munge: false

genome_build_check:
  - rsid: rs1421085
    chr: "16"
    pos: 53800954
  - rsid: rs429358
    chr: "19"
    pos: 45411941

smoke:
  n_snps: 100
  min_qsnp_nonna_frac: 0.10

qc_filters:
  qsnp_pval_threshold: 5.0e-8
  clump_p2: 1.0
  clump_r2: 0.1
  clump_kb: 250
  zsmooth_threshold: 1.96
  plink_binary: plink

factor_ldsc:
  intercept_warn_low: 0.9
  intercept_warn_high: 1.1

plots:
  manhattan_sig_line: 5.0e-8
  manhattan_sugg_line: 1.0e-5
  top_snps_n: 20
  # Manhattan + Miami downsampling: keep every SNP with P < manhattan_keep_threshold,
  # plus a random manhattan_bg_keep_frac fraction of the rest. Doesn't change the
  # significant signal, ~10x faster to render at 1M-point scale.
  # Set manhattan_bg_keep_frac: 1.0 to disable downsampling.
  manhattan_keep_threshold: 1.0e-3
  manhattan_bg_keep_frac: 0.1

parallel:
  n_workers: 24
  plan: multisession

logging:
  level: INFO
  json: true
  console: true
