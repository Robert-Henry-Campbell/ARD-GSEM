project:
  name: "ARD Genomic SEM"
  root: /mnt/sdg/robert/ardmr/GSEM

paths:
  sumstats_dir: sumstats
  manifest_dir: manifest
  meta_dir: meta
  reference_dir: reference
  output_dir: output
  ld_scores: reference/eur_w_ld_chr
  hm3_snplist: reference/w_hm3.snplist
  variants_manifest: manifest/variants.tsv.bgz
  thousand_g_plink: reference/1000G_Phase3_plinkfiles

munge:
  use_neff: true
  maf_threshold: 0.01
  # linear -> log(OR) conversion thresholds. Warn when sample prevalence K is below
  # K_warn_threshold (or above 1 - K_warn_threshold); reject when K(1-K) is below
  # K_reject_threshold. The Neale linear-regression-on-0/1 approximation degrades at
  # extreme K for SNPs with non-trivial effect; warn at 1%% by default.
  K_warn_threshold: 0.01
  K_reject_threshold: 1.0e-9
  # Set to null to skip the polarity check.
  polarity_sentinel:
    rsid: rs568226429
    a1: A

ldsc:
  h2_z_threshold: 2.0
  liability_scale: false

efa:
  rotation: geomin
  loading_threshold: 0.30
  use_parallel_analysis: true

cfa:
  estimator: DWLS
  model_source: both
  min_indicators_per_factor: 2
  apriori_source: icd10_chapters

comparison:
  mode: wald_test

gwas:
  smooth_check: true
  output_format: gwas_vcf
  genome_build: GRCh37
  study_id_prefix: ARD-GSEM
  snp_chunk_size: 50000
  qsnp_threshold: 5.0e-8        # Q_SNP_pval below this gets FILTER=Q_SNP_HET in the VCF
  write_qc_vcf: true            # also emit <sex>_chapter_gsem_qc.vcf.gz with Q_SNP_HET removed

plots:
  manhattan_sig_line: 5.0e-8
  manhattan_sugg_line: 1.0e-5
  top_snps_n: 20

parallel:
  n_workers: 24
  plan: multisession

logging:
  level: INFO
  json: true
  console: true
